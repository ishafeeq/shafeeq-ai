services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: bol-ai-backend:latest
    container_name: bol-ai-backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    environment:
      - GROQ_GUARDRAIL_MODEL=openai/gpt-oss-20b
      - GROQ_SYNTHESIZER_MODEL=openai/gpt-oss-120b
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://prometheus:9090/api/v1/otlp/v1/metrics
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - LITELLM_MASTER_KEY=sk-1234
    depends_on:
      - jaeger
      - prometheus
      - litellm
    secrets:
      - bol_sarvam_key
      - bol_tavily_key
      - bol_groq_key
      - bol_secret_key
      - bol_otp_auth_key
      - bol_ollama_base_url
      - bol_postgres_user
      - bol_postgres_pass
      - bol_postgres_db
      - bol_postgres_host
      - bol_dev_hardcoded_otp
    volumes:
      # Shared volume for audio uploads
      - uploads_data:/app/uploads
    ports:
      - "9101:8000"
    # Wait for DB, initialize schema, then start Gunicorn
    command: >
      bash -c " export SARVAM_API_KEY=\$$(cat /run/secrets/bol_sarvam_key); export TAVILY_API_KEY=\$$(cat /run/secrets/bol_tavily_key); export GROQ_API_KEY=\$$(cat /run/secrets/bol_groq_key); export SECRET_KEY=\$$(cat /run/secrets/bol_secret_key); export OTP_AUTH_KEY=\$$(cat /run/secrets/bol_otp_auth_key); export DEV_HARDCODED_OTP=\$$(cat /run/secrets/bol_dev_hardcoded_otp); export OLLAMA_BASE_URL=\$$(cat /run/secrets/bol_ollama_base_url); export POSTGRES_USER=\$$(cat /run/secrets/bol_postgres_user); export POSTGRES_PASSWORD=\$$(cat /run/secrets/bol_postgres_pass); export POSTGRES_DB=\$$(cat /run/secrets/bol_postgres_db); export POSTGRES_HOST=\$$(cat /run/secrets/bol_postgres_host); export DATABASE_URL=\"postgresql://\$${POSTGRES_USER}:\$${POSTGRES_PASSWORD}@\$${POSTGRES_HOST}:6543/\$${POSTGRES_DB}\"; python -m src.init_db && gunicorn src.main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 300"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: bol-ai-frontend:latest
    container_name: bol-ai-frontend
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    ports:
      # The application will be accessible at http://localhost:9100
      - "9100:80"
    depends_on:
      - backend
    volumes:
      # Read-only access to audio uploads for Nginx to serve
      - uploads_data:/app/uploads:ro

  jaeger:
    image: jaegertracing/jaeger:2.2.0
    container_name: bol-ai-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus scrape port (spanmetrics)
      - "14269:14269" # Admin port
    volumes:
      - ./jaeger/jaeger-config.yml:/etc/jaeger/jaeger-config.yml
      - ./jaeger/ui-config.json:/etc/jaeger/ui-config.json
    command: [ "--config", "/etc/jaeger/jaeger-config.yml" ]

  prometheus:
    image: prom/prometheus:latest
    container_name: bol-ai-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-otlp-receiver'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: bol-ai-grafana
    volumes:
      - ./grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: bol-ai-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
      - ./litellm/start_proxy.sh:/app/start_proxy.sh
    secrets:
      - bol_groq_key
      - bol_openrouter_key
    environment:
      - LITELLM_LOG=INFO
      - LITELLM_MASTER_KEY=sk-1234
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - LITELLM_MIGRATE=True
    entrypoint: [ "/bin/sh", "/app/start_proxy.sh" ]
    depends_on:
      jaeger:
        condition: service_started
      litellm-db:
        condition: service_healthy

  litellm-db:
    image: postgres:17-alpine
    container_name: bol-ai-litellm-db
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=litellm_pass
      - POSTGRES_DB=litellm_db
    volumes:
      - litellm_db_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U litellm -d litellm_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  uploads_data:
  prometheus_data:
  litellm_db_data:


secrets:
  bol_postgres_user:
    file: ./secrets/bol_postgres_user.txt
  bol_postgres_pass:
    file: ./secrets/bol_postgres_pass.txt
  bol_postgres_db:
    file: ./secrets/bol_postgres_db.txt
  bol_sarvam_key:
    file: ./secrets/bol_sarvam_key.txt
  bol_tavily_key:
    file: ./secrets/bol_tavily_key.txt
  bol_groq_key:
    file: ./secrets/bol_groq_key.txt
  bol_secret_key:
    file: ./secrets/bol_secret_key.txt
  bol_otp_auth_key:
    file: ./secrets/bol_otp_auth_key.txt
  bol_ollama_base_url:
    file: ./secrets/bol_ollama_base_url.txt
  bol_postgres_host:
    file: ./secrets/bol_postgres_host.txt
  bol_dev_hardcoded_otp:
    file: ./secrets/bol_dev_hardcoded_otp.txt
  bol_openrouter_key:
    file: ./secrets/bol_openrouter_key.txt
