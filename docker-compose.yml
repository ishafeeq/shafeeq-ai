services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sai-backend:latest
    container_name: sai-backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

    environment:
      - GROQ_GUARDRAIL_MODEL=openai/gpt-oss-20b
      - GROQ_SYNTHESIZER_MODEL=openai/gpt-oss-120b
      - OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-ap-south-1.grafana.net/otlp
      - OTEL_EXPORTER_OTLP_HEADERS_FILE=/run/secrets/bol_otel_headers
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=sai-backend
      - OTEL_RESOURCE_ATTRIBUTES=service.name=sai-backend,deployment.environment=production
    secrets:
      - bol_sarvam_key
      - bol_tavily_key
      - bol_groq_key
      - bol_secret_key
      - bol_otp_auth_key
      - bol_ollama_base_url
      - bol_postgres_user
      - bol_postgres_pass
      - bol_postgres_db
      - bol_postgres_host
      - bol_dev_hardcoded_otp
      - bol_otel_headers
      - bol_helicone_api_key
      - bol_openrouter_key
      - bol_msg91_widget_id
      - bol_msg91_token_auth
    volumes:
      # Shared volume for audio uploads
      - uploads_data:/app/uploads
    ports:
      - "9101:8000"
    # Wait for DB, initialize schema, then start Gunicorn
    command: >
      bash -c " export SARVAM_API_KEY=\$$(cat /run/secrets/bol_sarvam_key); export TAVILY_API_KEY=\$$(cat /run/secrets/bol_tavily_key); export GROQ_API_KEY=\$$(cat /run/secrets/bol_groq_key); export OPENROUTER_API_KEY=\$$(cat /run/secrets/bol_openrouter_key); export SECRET_KEY=\$$(cat /run/secrets/bol_secret_key); export OTP_AUTH_KEY=\$$(cat /run/secrets/bol_otp_auth_key); export DEV_HARDCODED_OTP=\$$(cat /run/secrets/bol_dev_hardcoded_otp); export OLLAMA_BASE_URL=\$$(cat /run/secrets/bol_ollama_base_url); export POSTGRES_USER=\$$(cat /run/secrets/bol_postgres_user); export POSTGRES_PASSWORD=\$$(cat /run/secrets/bol_postgres_pass); export POSTGRES_DB=\$$(cat /run/secrets/bol_postgres_db); export POSTGRES_HOST=\$$(cat /run/secrets/bol_postgres_host); export OTEL_EXPORTER_OTLP_HEADERS=\$$(cat /run/secrets/bol_otel_headers); export HELICONE_API_KEY=\$$(cat /run/secrets/bol_helicone_api_key); export DATABASE_URL=\"postgresql://\$${POSTGRES_USER}:\$${POSTGRES_PASSWORD}@\$${POSTGRES_HOST}:6543/\$${POSTGRES_DB}\"; python -m src.init_db && gunicorn src.main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 300"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sai-frontend:latest
    container_name: sai-frontend
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    ports:
      # The application will be accessible at http://localhost:9100
      - "9100:80"
    depends_on:
      - backend
    volumes:
      # Read-only access to audio uploads for Nginx to serve
      - uploads_data:/app/uploads:ro

volumes:
  uploads_data:


secrets:
  bol_postgres_user:
    file: ./secrets/bol_postgres_user.txt
  bol_postgres_pass:
    file: ./secrets/bol_postgres_pass.txt
  bol_postgres_db:
    file: ./secrets/bol_postgres_db.txt
  bol_sarvam_key:
    file: ./secrets/bol_sarvam_key.txt
  bol_tavily_key:
    file: ./secrets/bol_tavily_key.txt
  bol_groq_key:
    file: ./secrets/bol_groq_key.txt
  bol_secret_key:
    file: ./secrets/bol_secret_key.txt
  bol_otp_auth_key:
    file: ./secrets/bol_otp_auth_key.txt
  bol_ollama_base_url:
    file: ./secrets/bol_ollama_base_url.txt
  bol_postgres_host:
    file: ./secrets/bol_postgres_host.txt
  bol_dev_hardcoded_otp:
    file: ./secrets/bol_dev_hardcoded_otp.txt
  bol_openrouter_key:
    file: ./secrets/bol_openrouter_key.txt
  bol_otel_headers:
    file: ./secrets/bol_otel_headers.txt
  bol_helicone_api_key:
    file: ./secrets/bol_helicone_api_key.txt
  bol_msg91_widget_id:
    file: ./secrets/bol_msg91_widget_id.txt
  bol_msg91_token_auth:
    file: ./secrets/bol_msg91_token_auth.txt
