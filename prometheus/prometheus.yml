global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jaeger-spanmetrics'
    static_configs:
      - targets: ['jaeger:8889']

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269'] # Jaeger admin/metrics port

# Enable OTLP receiver (Prometheus 2.47+)
otlp:
  promote_resource_attributes:
    - service.name
    - deployment.environment
    - gen_ai.response.model
    - telemetry.sdk.language
    - telemetry.sdk.name
    - service.namespace
    - service.instance.id
    - cloud.region
    - cloud.availability_zone
    - cloud.platform
    - host.id
    - host.name
    - host.type
    - k8s.cluster.name
    - k8s.container.name
    - k8s.cronjob.name
    - k8s.daemonset.name
    - k8s.deployment.name
    - k8s.job.name
    - k8s.namespace.name
    - k8s.node.name
    - k8s.pod.name
    - k8s.pod.uid
    - k8s.replicaset.name
    - k8s.statefulset.name
