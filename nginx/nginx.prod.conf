worker_processes  1;
events {
    worker_connections  1024;
}
http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Increase upload size limit for audio files
    client_max_body_size 50M;
    # Explicit temp path to avoid permission issues
    client_body_temp_path /Users/shafeeq/Documents/jeetu-code-assistant/nginx/temp;
    
    sendfile        on;
    keepalive_timeout  65;

    # SSL configuration (same as dev)
    server {
        listen       8443 ssl;
        server_name  localhost;

        ssl_certificate      /Users/shafeeq/Documents/jeetu-code-assistant/nginx/certs/selfsigned.crt;
        ssl_certificate_key  /Users/shafeeq/Documents/jeetu-code-assistant/nginx/certs/selfsigned.key;

        # 1. Serve Frontend Build (Static)
        location / {
            root   /Users/shafeeq/Documents/jeetu-code-assistant/frontend/dist;
            index  index.html;
            try_files $uri $uri/ /index.html;  # SPA fallback
        }

        # 2. Proxy API to Backend
        location /api/ {
            proxy_pass http://127.0.0.1:8000/;  # Gunicorn port (trailing slash needed to strip /api prefix?)
            # Wait, FastAPI strips /api automatically? No, in deploy_dev.sh /api mounts to /
            # If backend is on 8000/, then http://127.0.0.1:8000/users/me works.
            # If request is /api/users/me, proxy_pass http://127.0.0.1:8000/ will map to /users/me nicely.
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Helper headers
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout for AI generation
            proxy_read_timeout 300s;
        }

        # 3. Serve Uploads (Directly from disk)
        location /uploads/ {
            alias /Users/shafeeq/Documents/jeetu-code-assistant/backend/uploads/;
            autoindex off;
        }
    }

    # Redirect HTTP to HTTPS
    server {
        listen 8080;
        server_name localhost;
        return 301 https://$host:8443$request_uri;
    }
}
