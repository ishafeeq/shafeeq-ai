worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10M;

    # Logging
    access_log /Users/shafeeq/Documents/jeetu-code-assistant/nginx/logs/access.log;
    error_log /Users/shafeeq/Documents/jeetu-code-assistant/nginx/logs/error.log;

    # Temp paths for large uploads
    client_body_temp_path /Users/shafeeq/Documents/jeetu-code-assistant/nginx/temp/client_body_temp;
    proxy_temp_path /Users/shafeeq/Documents/jeetu-code-assistant/nginx/temp/proxy_temp;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen       0.0.0.0:8080;
        server_name  _;
        return 301   https://$host:8443$request_uri;
    }

    # ── HTTPS main server ────────────────────────────────────────────────────
    server {
        listen       0.0.0.0:8443 ssl;
        server_name  _;

        ssl_certificate     /Users/shafeeq/Documents/jeetu-code-assistant/nginx/ssl.crt;
        ssl_certificate_key /Users/shafeeq/Documents/jeetu-code-assistant/nginx/ssl.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        proxy_buffering off;

        # Backend API — strip /api prefix before forwarding to FastAPI
        location /api/ {
            proxy_pass http://localhost:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300;
        }

        # Static uploads served directly by FastAPI
        location /uploads/ {
            proxy_pass http://localhost:8000/uploads/;
            proxy_set_header Host $host;
            proxy_read_timeout 120;
        }

        # FastAPI docs
        location /docs {
            proxy_pass http://localhost:8000/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://localhost:8000/openapi.json;
            proxy_set_header Host $host;
        }

        # Frontend (Vite) — catch-all, must be last
        location / {
            proxy_pass http://localhost:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }
    }
}
